<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Overtime PWA</title>

<link rel="manifest" href="manifest.json">

<style>
body{font-family:sans-serif;direction:rtl;background:#f5f5f5;padding:20px}
.box{max-width:900px;margin:auto;background:white;padding:15px;border-radius:10px}
input,button{padding:10px;margin:5px}
table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{border:1px solid #ddd;padding:8px;text-align:center}
</style>
</head>

<body>

<div class="box">
<h2>⏱ Overtime Tracker</h2>

<input type="time" id="start" value="16:00"/>
<input type="time" id="end"/>
<button onclick="add()">ثبت</button>

<h3 id="sum"></h3>

<table>
<thead>
<tr>
<th>تاریخ</th>
<th>ورود</th>
<th>خروج</th>
<th>دقیقه</th>
<th>مبلغ</th>
</tr>
</thead>
<tbody id="t"></tbody>
</table>

</div>

<script src="app.js"></script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
